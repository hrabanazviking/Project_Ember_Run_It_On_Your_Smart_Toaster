# =============================================================================
# Hamr Example Spec — Völva (Seeress / Mage)
# =============================================================================
# A mysterious Norse seeress with flowing silver hair and ritual silks.
# Run with: hamr build examples/mage_volva.yaml --out output/
#
# She sees the threads of wyrd, and the threads tremble.
# =============================================================================

name: "Alruna Seer-of-Roots"
version: "1.0"

body:
  height_cm: 168
  build: slender
  skin:
    base_hex: "#D4B896"
    undertone: cool
    sss: true
  proportions:
    shoulder_width: 0.38
    bust: 0.35
    waist: 0.28
    hip_width: 0.42
    leg_length: 0.54

hair:
  style: wavy
  length: very-long
  volume: 0.9
  curl_tightness: 0.3
  color:
    roots: "#A8A8C0"
    mid: "#C0C0D8"
    tips: "#E0E0F0"
    highlight: "#F5F5FF"

face:
  jaw: V-shape
  eyes:
    iris_hex: "#7B68EE"
    pupil_hex: "#0D0D1A"
    sclera_hex: "#F5F5F0"
    shape: cat-tilt
    size: 1.3
  eyebrows:
    color_hex: "#9090A0"
    thickness: 0.05
    shape: arched
  nose:
    bridge_width: 0.30
    tip_width: 0.25
    bridge_height: 0.55
  mouth:
    lip_hex: "#B07080"
    width: 0.35
    fullness: 0.60
  cheeks:
    blush_hex: "#D0A0A0"
    bone_width: 0.55
  ears:
    elf_factor: 0.3

clothing:
  - name: ritual_robes
    type: dress
    primary_hex: "#2D1B4E"
    secondary_hex: "#4A2D6E"
    material_category: silk
  - name: silver_circlet
    type: jewelry
    primary_hex: "#C0C0C0"
    material_category: metal
  - name: runestone_pendant
    type: jewelry
    primary_hex: "#505050"
    material_category: metal
  - name: soft_moccasins
    type: footwear
    primary_hex: "#5C4033"
    material_category: leather

export:
  format: vrm1
  title: "Alruna Seer-of-Roots"
  author: "Hamr Forge"
  version: "1.0"
  license: CC-BY-4.0